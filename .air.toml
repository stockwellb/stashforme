# Air configuration for hot reload
root = "."
tmp_dir = "tmp"

[build]
  # Command to build the project
  cmd = "templ generate && go build -o ./tmp/main ./cmd/server"
  # Binary output
  bin = "./tmp/main"
  # Watch these extensions
  include_ext = ["go", "templ", "html", "css", "js"]
  # Exclude directories
  exclude_dir = ["tmp", "vendor", ".git", "node_modules"]
  # Exclude files
  exclude_file = []
  # Exclude generated templ files to prevent rebuild loop
  exclude_regex = ["_templ\\.go$"]
  # Exclude unchanged files
  exclude_unchanged = false
  # Follow symlinks
  follow_symlink = false
  # Delay before rebuilding (ms)
  delay = 1000
  # Stop running old binary when build errors occur
  stop_on_error = true
  # Send interrupt signal before kill
  send_interrupt = true
  # Kill delay
  kill_delay = "2s"

[log]
  # Show log time
  time = false

[color]
  # Customize colors
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  # Delete tmp directory on exit
  clean_on_exit = true
